<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Эпюр Монжа · Индустриальный футуризм + 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <style>
        * { user-select: none; box-sizing: border-box; touch-action: manipulation; }
        
        /* ---------- INDUSTRIAL FUTURISM CORE ---------- */
        :root {
            --metal-base: #171a1f;
            --metal-panel: #1f232a;
            --metal-canvas: #1e2129;
            --metal-border: #3a3e48;
            --text-primary: #eef2f8;
            --text-secondary: #9ca3b5;
            
            --orange-pulse: #ff5500;
            --orange-active: #e6451a;
            --orange-glow: #b53a0a;
            --orange-preview: #ff8c42;
            
            --cyan-system: #00a6c4;
            --cyan-sensor: #2a9d8f;
            
            --success: #4caf50;
            --error: #ff5e5e;
            --warning: #ffb347;
        }
        
        body { 
            margin: 0; 
            padding: 0; 
            background: var(--metal-base);
            background-image: repeating-linear-gradient(
                45deg,
                rgba(255, 255, 255, 0.02) 0px,
                rgba(255, 255, 255, 0.02) 1px,
                transparent 1px,
                transparent 12px
            );
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        
        /* ---------- ТУЛБАР (металл, сварка) ---------- */
        .toolbar { 
            position: fixed; 
            top: 20px; 
            left: 20px; 
            z-index: 100; 
            width: 280px; 
            background: var(--metal-panel);
            border-radius: 2px;
            padding: 20px 12px; 
            border: 1px solid var(--metal-border);
            box-shadow: inset 0 0 0 1px rgba(255,85,0,0.1), 0 8px 16px rgba(0,0,0,0.5);
        }
        
        .tool-btn { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            width: 100%; 
            padding: 10px 14px; 
            background: #1f232a;
            border: 1px solid var(--metal-border); 
            border-radius: 2px; 
            font-size: 0.85rem; 
            font-weight: 500; 
            font-family: inherit; 
            color: var(--text-primary); 
            cursor: pointer; 
            transition: all 0.08s linear; 
            text-align: left; 
            margin-bottom: 8px; 
        }
        .tool-btn:hover { 
            transform: translateY(1px); 
            border-color: var(--orange-active); 
            box-shadow: 0 2px 8px rgba(255,85,0,0.3);
        }
        .tool-btn:active { transform: translateY(2px); }
        .mode-active { 
            border-bottom: 2px solid var(--orange-pulse);
            color: var(--orange-pulse);
            background: #252a33;
        }
        .new-object-btn { 
            background: #1f2129; 
            border: 1px solid var(--orange-pulse); 
            margin-top: 16px; 
            justify-content: space-between; 
        }
        .btn-icon { font-size: 1.1rem; width: 28px; text-align: center; }
        .right-badge { display: flex; align-items: center; gap: 8px; }
        .color-indicator { width: 22px; height: 22px; border-radius: 2px; border: 1px solid rgba(255,255,255,0.3); }
        
        /* ========== ПАНЕЛИ ИНФО — ИНДУСТРИАЛЬНЫЙ ФУТУРИЗМ ========== */
        .info-panel { 
            position: fixed; 
            top: 20px; 
            right: 20px; 
            z-index: 100; 
            width: 320px; 
            background: var(--metal-panel);
            border: 1px solid var(--metal-border);
            border-radius: 2px;
            box-shadow: inset 0 0 0 1px rgba(255,85,0,0.08), 0 6px 14px rgba(0,0,0,0.5);
            backdrop-filter: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 14px;
        }
        
        .info-card { 
            background: #181c23;
            border-left: 3px solid var(--orange-pulse);
            border-radius: 2px;
            padding: 12px 14px;
            position: relative;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.02), 0 2px 3px rgba(0,0,0,0.3);
            transition: border-left-color 0.1s ease;
        }
        .info-card::after {
            content: '';
            position: absolute;
            top: 4px;
            left: 4px;
            right: 4px;
            bottom: 4px;
            pointer-events: none;
            border: 1px dashed rgba(255,85,0,0.2);
            border-radius: 0px;
        }
        
        .info-title { 
            font-size: 0.75rem; 
            font-weight: 600; 
            color: var(--orange-pulse);
            margin-bottom: 12px; 
            letter-spacing: 1px;
            display: flex; 
            align-items: center; 
            gap: 8px;
            text-transform: uppercase;
            font-family: 'Major Mono Display', monospace;
        }
        .info-content { 
            font-size: 0.7rem; 
            color: var(--text-secondary); 
            line-height: 1.5; 
            font-family: monospace; 
        }
        .class-type { 
            color: var(--orange-pulse); 
            font-weight: bold;
            background: rgba(255,85,0,0.12);
            display: inline-block;
            padding: 2px 8px;
            letter-spacing: 0.3px;
            border-left: 2px solid var(--orange-pulse);
        }
        .class-desc { 
            color: #b9c2d4; 
            margin-top: 6px; 
            font-size: 0.68rem;
        }
        
        #lineVector, #planeNormal {
            font-size: 0.65rem;
            color: var(--cyan-sensor);
            margin-top: 8px;
            border-top: 1px dashed #3a3e48;
            padding-top: 6px;
            font-family: monospace;
        }
        
        /* ---------- ХОЛСТЫ + 3D ---------- */
        .canvas-area { display: flex; justify-content: center; align-items: center; width: 100%; height: 100vh; overflow: hidden; }
        
        /* 🔥 НОВАЯ ОРАНЖЕВАЯ ОБВОДКА ВОКРУГ ОСНОВНОГО КОНТЕЙНЕРА С ЭПЮРОМ 🔥 */
        .container { 
            display: flex; 
            gap: 0; 
            position: relative; 
            background: #0a0a0e; 
            padding: 6px; 
            border-radius: 16px;          /* небольшое скругление */
            border: 2px solid #ff5500;    /* яркая оранжевая обводка */
            box-shadow: 0 0 0 1px rgba(255,85,0,0.3), 0 0 12px rgba(255,85,0,0.3);
        }
        
        .left { display: flex; flex-direction: column; gap: 0; }
        #profileColumn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }
        canvas { 
            background-color: var(--metal-canvas);
            cursor: crosshair; 
            display: block; 
            border: 1px solid var(--metal-border);
            touch-action: none; 
            will-change: transform;
            transition: border-color 0.08s linear;
        }
        canvas:first-child { border-bottom: none; }
        
        #threeContainer { 
            background: #111216; 
            overflow: hidden;
            position: relative;
            border: 1px solid var(--metal-border);
            margin-top: 0;
        }
        
        .common-axes { position: absolute; pointer-events: none; z-index: 10; top: 0; left: 0; width: 100%; height: 100%; }
        .axis-line { position: absolute; background-color: currentColor; opacity: 0.85; }
        .axis-label { position: absolute; font-size: 11px; font-weight: 600; background: #111216cc; backdrop-filter: blur(2px); padding: 2px 5px; border-radius: 0px; font-family: monospace; color: var(--orange-pulse); border-left: 1px solid var(--orange-pulse); }
        
        @keyframes glowDischarge {
            0% { border-color: var(--orange-pulse); box-shadow: 0 0 4px var(--orange-pulse); }
            50% { border-color: var(--orange-glow); box-shadow: 0 0 12px var(--orange-pulse); }
            100% { border-color: var(--orange-pulse); box-shadow: 0 0 4px var(--orange-pulse); }
        }
        .drawing-active {
            animation: glowDischarge 1s infinite;
        }
        
        /* === СЛОЙ ДЛЯ ЛИНИЙ СВЯЗИ (ЭНЕРГЕТИЧЕСКИЙ СИНИЙ ПУНКТИР) === */
        .connection-lines-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }
        
        @media (max-width: 860px) {
            .toolbar { width: 240px; }
            .info-panel { width: 280px; padding: 10px; }
        }
        @media (max-width: 768px) {
            .toolbar { position: fixed; bottom: 12px; left: 12px; right: auto; top: auto; width: auto; background: rgba(23,26,31,0.96); backdrop-filter: blur(0px); border-radius: 2px; padding: 5px 10px; display: flex; flex-direction: row; justify-content: space-around; gap: 4px; z-index: 200; border: 1px solid var(--metal-border); }
            .tool-btn { width: auto; padding: 6px 0; margin: 0; background: transparent; border: none; justify-content: center; flex: 1; }
            .tool-btn span:not(.btn-icon) { display: none; }
            .tool-btn .btn-icon { font-size: 1.4rem; width: auto; }
            .mode-active { background: rgba(255,85,0,0.3); color: var(--orange-pulse); }
            .new-object-btn .right-badge { display: none; }
            .info-panel { display: none; }
            #threeContainer { width: 100%; height: auto; }
        }
    </style>
</head>
<body>
<div class="toolbar">
    <button id="clearBtn" class="tool-btn"><span class="btn-icon">⌫</span><span>Очистить</span></button>
    <button id="lineBtn" class="tool-btn mode-active"><span class="btn-icon">⎯</span><span>Отрезок</span></button>
    <button id="rectBtn" class="tool-btn"><span class="btn-icon">□</span><span>Прямоугольник</span></button>
    <button id="ellipseBtn" class="tool-btn"><span class="btn-icon">○</span><span>Эллипс</span></button>
    <button id="planeBtn" class="tool-btn"><span class="btn-icon">△</span><span>Плоскость (3 точки)</span></button>
    <button id="newObjectBtn" class="tool-btn new-object-btn"><span class="btn-icon">+</span><span>Новый объект</span><div class="right-badge"><div id="colorIndicator" class="color-indicator" style="background-color: #ff5500;"></div></div></button>
    <!-- НОВАЯ КНОПКА: ВКЛ/ВЫКЛ ЛИНИЙ СВЯЗИ -->
    <button id="toggleLinesBtn" class="tool-btn" style="margin-top: 8px; border-color: #00aaff;"><span class="btn-icon">🔗</span><span>Линии связи</span><div class="right-badge"><span id="linesToggleStatus" style="font-size: 0.7rem; color: #00aaff;">ВКЛ</span></div></button>
</div>

<div class="info-panel">
    <div class="info-card">
        <div class="info-title">📐 КЛАССИФИКАЦИЯ ОТРЕЗКА</div>
        <div class="info-content">
            <div><span class="class-type" id="lineType">—</span></div>
            <div class="class-desc" id="lineDesc">Нарисуйте отрезок</div>
            <div id="lineVector" style="font-size: 10px; color: #2a9d8f; margin-top: 6px;"></div>
        </div>
    </div>
    <div class="info-card">
        <div class="info-title">⬟ КЛАССИФИКАЦИЯ ПЛОСКОСТИ (треугольник)</div>
        <div class="info-content">
            <div><span class="class-type" id="planeType">—</span></div>
            <div class="class-desc" id="planeDesc">Постройте треугольник</div>
            <div id="planeNormal" style="font-size: 10px; color: #2a9d8f; margin-top: 6px;"></div>
        </div>
    </div>
</div>

<div class="canvas-area">
    <div class="container" id="mainContainer">
        <div class="left">
            <canvas id="frontal" width="340" height="340"></canvas>
            <canvas id="horizontal" width="340" height="340"></canvas>
        </div>
        <div id="profileColumn">
            <canvas id="profile" width="340" height="340"></canvas>
            <div id="threeContainer"></div>
        </div>
        <div class="common-axes" id="commonAxes"></div>
    </div>
</div>

<script>
    (function(){
        // ---------- ПАРАМЕТРЫ (полностью сохранённая логика APLV2) ----------
        let CANVAS_SIZE = 340;
        const BASE_GRID_STEP = 20;
        let GRID_STEP = BASE_GRID_STEP;
        const EPS = 1e-9;
        const TOLERANCE = 6;
        const PRIMITIVE_TYPES = { LINE: 'line', RECT: 'rect', ELLIPSE: 'ellipse', PLANE: 'plane' };
        let currentPrimitive = PRIMITIVE_TYPES.LINE;
        
        const canvasV = document.getElementById('frontal');
        const canvasH = document.getElementById('horizontal');
        const canvasP = document.getElementById('profile');
        let ctxV = canvasV.getContext('2d');
        let ctxH = canvasH.getContext('2d');
        let ctxP = canvasP.getContext('2d');
        const container = document.getElementById('mainContainer');
        const axesContainer = document.getElementById('commonAxes');
        
        let spatialObjects = [];
        let activeObject = null;
        let drawing = false;
        let startX, startY;
        let currentCanvas = null;
        let currentPlane = null;
        let previewLine = null;
        let currentColor = '#ff5500';
        let isNewObjectMode = false;
        let currentPointKey = null;
        
        let auxConstraints = { H: { minX: null, maxX: null, minY: null, maxY: null }, V: { minX: null, maxX: null, minY: null, maxY: null }, P: { minX: null, maxX: null, minY: null, maxY: null } };
        let startConstraintType = null, startConstraintValue = null;
        const colorPalette = ['#ff5500', '#ff4d4d', '#4caf50', '#ffb347', '#6a4e9b', '#2c9f9f', '#ff6b6b', '#e879f9'];
        let colorIndex = 0;
        let constraintsDirty = true;
        let redrawScheduled = false;
        
        let planeTempVertex = { x: null, y: null, z: null };
        let planeBuilding = false;
        let planeStartPlane = null;
        let planeStartCoords = null;
        let planeMousePos = null;
        
        // ====================== THREE.JS (из base.html) ======================
        let scene, camera, renderer;
        let threeMeshes = [];
        const UNIT_SCALE = 6.3;
        
        function toGridUnits(worldX, worldY, worldZ) {
            if (worldX === null || worldY === null || worldZ === null) return null;
            let x = (CANVAS_SIZE - worldX) / GRID_STEP;
            let y = (CANVAS_SIZE - worldY) / GRID_STEP;
            let z = worldZ / GRID_STEP;
            return { x: Math.round(x), y: Math.round(y), z: Math.round(z) };
        }
        
        function worldTo3D(point) {
            if (!point || point.x === null || point.y === null || point.z === null) return null;
            const grid = toGridUnits(point.x, point.y, point.z);
            if (!grid) return null;
            return new THREE.Vector3(grid.x * UNIT_SCALE, grid.z * UNIT_SCALE, grid.y * UNIT_SCALE);
        }
        
        function createCylinderBetweenPoints(start3D, end3D, radius, color) {
            const direction = new THREE.Vector3().subVectors(end3D, start3D);
            const length = direction.length();
            if (length < 0.5) {
                const sphere = new THREE.Mesh(new THREE.SphereGeometry(radius*2, 16, 16),
                    new THREE.MeshPhongMaterial({color: color}));
                sphere.position.copy(start3D);
                return sphere;
            }
            const center = new THREE.Vector3().addVectors(start3D, end3D).multiplyScalar(0.5);
            const cylinder = new THREE.Mesh(
                new THREE.CylinderGeometry(radius, radius, length, 16),
                new THREE.MeshPhongMaterial({color: color, shininess: 25})
            );
            cylinder.position.copy(center);
            cylinder.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), direction.clone().normalize());
            return cylinder;
        }
        
        function createPlaneMesh(points, color) {
            if (!points || points.length !== 3) return null;
            const p1 = worldTo3D(points[0]);
            const p2 = worldTo3D(points[1]);
            const p3 = worldTo3D(points[2]);
            if (!p1 || !p2 || !p3) return null;
            const geometry = new THREE.BufferGeometry();
            const vertices = new Float32Array([
                p1.x, p1.y, p1.z,
                p2.x, p2.y, p2.z,
                p3.x, p3.y, p3.z
            ]);
            geometry.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
            geometry.setIndex([0,1,2]);
            geometry.computeVertexNormals();
            const material = new THREE.MeshPhongMaterial({
                color: color,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.45,
                emissive: 0x000000
            });
            const mesh = new THREE.Mesh(geometry, material);
            // Добавим каркас для чёткости
            const edgesGeo = new THREE.EdgesGeometry(geometry);
            const edgesMat = new THREE.LineBasicMaterial({ color: color, linewidth: 1 });
            const wireframe = new THREE.LineSegments(edgesGeo, edgesMat);
            mesh.add(wireframe);
            return mesh;
        }
        
        function refresh3D() {
            if (!scene) return;
            threeMeshes.forEach(m => { scene.remove(m); if(m.geometry) m.geometry.dispose(); if(m.material) m.material.dispose(); });
            threeMeshes = [];
        
            spatialObjects.forEach(obj => {
                if (!isObjectComplete(obj)) return;
                if (obj.primitive === PRIMITIVE_TYPES.PLANE) {
                    const mesh = createPlaneMesh(obj.points, obj.color);
                    if (mesh) {
                        scene.add(mesh);
                        threeMeshes.push(mesh);
                        // добавим сферы в вершинах для наглядности
                        obj.points.forEach(p => {
                            const pt3 = worldTo3D(p);
                            if (pt3) {
                                const sphereGeo = new THREE.SphereGeometry(2.2, 12, 12);
                                const sphereMat = new THREE.MeshPhongMaterial({ color: obj.color, emissive: 0x331100 });
                                const sphere = new THREE.Mesh(sphereGeo, sphereMat);
                                sphere.position.copy(pt3);
                                scene.add(sphere);
                                threeMeshes.push(sphere);
                            }
                        });
                    }
                    return;
                }
                const s3 = worldTo3D(obj.start);
                const e3 = worldTo3D(obj.end);
                if (!s3 || !e3) return;
        
                let mesh = null;
                if (obj.primitive === PRIMITIVE_TYPES.LINE) {
                    mesh = createCylinderBetweenPoints(s3, e3, 2.8, obj.color);
                } else if (obj.primitive === PRIMITIVE_TYPES.RECT) {
                    const gs = toGridUnits(obj.start.x, obj.start.y, obj.start.z);
                    const ge = toGridUnits(obj.end.x, obj.end.y, obj.end.z);
                    const cx = ((gs.x + ge.x)/2) * UNIT_SCALE;
                    const cy = ((gs.z + ge.z)/2) * UNIT_SCALE;
                    const cz = ((gs.y + ge.y)/2) * UNIT_SCALE;
                    const sx = Math.max(Math.abs(gs.x - ge.x) * UNIT_SCALE, 5);
                    const sy = Math.max(Math.abs(gs.z - ge.z) * UNIT_SCALE, 5);
                    const sz = Math.max(Math.abs(gs.y - ge.y) * UNIT_SCALE, 5);
                    mesh = new THREE.Mesh(new THREE.BoxGeometry(sx, sy, sz),
                        new THREE.MeshPhongMaterial({color: obj.color, transparent: true, opacity: 0.8}));
                    mesh.position.set(cx, cy, cz);
                } else if (obj.primitive === PRIMITIVE_TYPES.ELLIPSE) {
                    const gs = toGridUnits(obj.start.x, obj.start.y, obj.start.z);
                    const ge = toGridUnits(obj.end.x, obj.end.y, obj.end.z);
                    const cx = ((gs.x + ge.x)/2) * UNIT_SCALE;
                    const cy = ((gs.z + ge.z)/2) * UNIT_SCALE;
                    const cz = ((gs.y + ge.y)/2) * UNIT_SCALE;
                    const rx = Math.max(Math.abs(gs.x - ge.x)/2 * UNIT_SCALE, 6);
                    const ry = Math.max(Math.abs(gs.z - ge.z)/2 * UNIT_SCALE, 6);
                    const rz = Math.max(Math.abs(gs.y - ge.y)/2 * UNIT_SCALE, 6);
                    mesh = new THREE.Mesh(new THREE.SphereGeometry(1, 32, 24),
                        new THREE.MeshPhongMaterial({color: obj.color, transparent: true, opacity: 0.75}));
                    mesh.position.set(cx, cy, cz);
                    mesh.scale.set(rx, ry, rz);
                }
                if (mesh) {
                    scene.add(mesh);
                    threeMeshes.push(mesh);
                }
            });
        }
        
        function initThree() {
            const threeDiv = document.getElementById('threeContainer');
            scene = new THREE.Scene();
            scene.background = new THREE.Color('#111216');
            camera = new THREE.PerspectiveCamera(50, 1, 10, 3000);
            camera.position.set(175, 145, 210);
            camera.lookAt(0, 15, 0);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(CANVAS_SIZE, CANVAS_SIZE);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            threeDiv.appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xbbbbbb, 0.85));
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
            dirLight.position.set(150, 200, 140);
            scene.add(dirLight);
            const backLight = new THREE.DirectionalLight(0xffffff, 0.5);
            backLight.position.set(-100, -50, -80);
            scene.add(backLight);
            const grid = new THREE.GridHelper(180, 18, 0x555555, 0x333333);
            scene.add(grid);
            // Оси с цветами и тонкие
            const axisRadius = 0.4;
            const axisLength = 70;
            const xAxisMaterial = new THREE.MeshPhongMaterial({ color: '#ff3333', emissive: '#331100', shininess: 60 });
            const xAxisCyl = new THREE.Mesh(new THREE.CylinderGeometry(axisRadius, axisRadius, axisLength, 8), xAxisMaterial);
            xAxisCyl.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), new THREE.Vector3(1,0,0));
            xAxisCyl.position.set(axisLength/2, 0, 0);
            scene.add(xAxisCyl);
            const yAxisMaterial = new THREE.MeshPhongMaterial({ color: '#3399ff', emissive: '#113300', shininess: 60 });
            const yAxisCyl = new THREE.Mesh(new THREE.CylinderGeometry(axisRadius, axisRadius, axisLength, 8), yAxisMaterial);
            yAxisCyl.position.set(0, axisLength/2, 0);
            scene.add(yAxisCyl);
            const zAxisMaterial = new THREE.MeshPhongMaterial({ color: '#33ff33', emissive: '#001133', shininess: 60 });
            const zAxisCyl = new THREE.Mesh(new THREE.CylinderGeometry(axisRadius, axisRadius, axisLength, 8), zAxisMaterial);
            zAxisCyl.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), new THREE.Vector3(0,0,1));
            zAxisCyl.position.set(0, 0, axisLength/2);
            scene.add(zAxisCyl);
            const coneRadius = 0.9;
            const coneHeight = 3.5;
            const xConeGeo = new THREE.ConeGeometry(coneRadius, coneHeight, 12);
            const xCone = new THREE.Mesh(xConeGeo, xAxisMaterial);
            xCone.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), new THREE.Vector3(1,0,0));
            xCone.position.set(axisLength, 0, 0);
            scene.add(xCone);
            const yCone = new THREE.Mesh(xConeGeo, yAxisMaterial);
            yCone.position.set(0, axisLength, 0);
            scene.add(yCone);
            const zCone = new THREE.Mesh(xConeGeo, zAxisMaterial);

            const unique = [];
            const seen = new Set();
            for (let p of points) {

            if (points.length === 0) return;
            
            // ИСПРАВЛЕНИЕ: явно задаём stroke-dasharray и проверяем поддержку
            const style = { 
                stroke: "#00aaff", 
                strokeWidth: "1.5",

            for (let pt of points) {
                const posH = getAbsolutePos(canvasH, pt.x, pt.y, 'H');
                const posV = getAbsolutePos(canvasV, pt.x, pt.z, 'V');

                    line.setAttribute("x1", posH.x);
                    line.setAttribute("y1", posH.y);

                    line.setAttribute("y2", posV.y);

                    svgLayer.appendChild(line);
                }

                    line.setAttribute("x1", posV.x);
                    line.setAttribute("y1", posV.y);
                    line.setAttribute("x2", posP.x);

                    toggleBtn.style.borderColor = "#ff5555";
                }
            }
            scheduleRedraw(); // перерисовка (вызовет updateConnectionLines с новым состоянием)
        }
        // ===================== КОНЕЦ ДОБАВЛЕННОГО КОДА =====================
        
        function scheduleRedraw() { if(!redrawScheduled){ redrawScheduled=true; requestAnimationFrame(()=>{ redrawScheduled=false; updateProjections(); updateAllClassifications(); refresh3D(); updateConnectionLines(); }); } }
        
        function classifyLineSegment(p1,p2){
            if(!p1||!p2) return {type:"—", desc:"Недостаточно данных", vec:null};
            if(p1.x===null||p1.y===null||p1.z===null||p2.x===null||p2.y===null||p2.z===null) return {type:"⏳ Ожидание", desc:"Задайте обе точки", vec:null};
            let dx=p2.x-p1.x, dy=p2.y-p1.y, dz=p2.z-p1.z;
            let v={x:dx/GRID_STEP, y:dy/GRID_STEP, z:dz/GRID_STEP};
            if(Math.abs(dx)<EPS&&Math.abs(dy)<EPS&&Math.abs(dz)<EPS) return {type:"🔴 Точка", desc:"Вырожденный отрезок", vec:v};
            if(Math.abs(dx)<EPS&&Math.abs(dy)<EPS) return {type:"📌 Горизонтально-проецирующая", desc:"⊥ Π₁, на H — точка", vec:v};
            if(Math.abs(dx)<EPS&&Math.abs(dz)<EPS) return {type:"📌 Фронтально-проецирующая", desc:"⊥ Π₂, на V — точка", vec:v};
            if(Math.abs(dy)<EPS&&Math.abs(dz)<EPS) return {type:"📌 Профильно-проецирующая", desc:"⊥ Π₃, на P — точка", vec:v};
            if(Math.abs(dz)<EPS) return {type:"📐 Горизонтальная уровня", desc:"∥ Π₁, Z = const", vec:v};
            if(Math.abs(dy)<EPS) return {type:"📐 Фронтальная уровня", desc:"∥ Π₂, Y = const", vec:v};
            if(Math.abs(dx)<EPS) return {type:"📐 Профильная уровня", desc:"∥ Π₃, X = const", vec:v};
            return {type:"🎲 Прямая общего положения", desc:"Проецируется с искажением", vec:v};
        }
        function classifyPlane(p1,p2,p3){
            if(!p1||!p2||!p3) return {type:"—", desc:"Недостаточно точек", normal:null};
            if(p1.x===null||p1.y===null||p1.z===null||p2.x===null||p2.y===null||p2.z===null||p3.x===null||p3.y===null||p3.z===null) 
                return {type:"⏳ Ожидание", desc:"Задайте все три вершины", normal:null};
            let u={x:p2.x-p1.x, y:p2.y-p1.y, z:p2.z-p1.z};
            let v={x:p3.x-p1.x, y:p3.y-p1.y, z:p3.z-p1.z};
            let nx = u.y*v.z - u.z*v.y;
            let ny = u.z*v.x - u.x*v.z;
            let nz = u.x*v.y - u.y*v.x;
            let norm = Math.hypot(nx,ny,nz);
            if(norm<EPS) return {type:"⚠️ Вырожденная", desc:"Точки коллинеарны", normal:null};
            let normal = {x:nx/norm, y:ny/norm, z:nz/norm};
            let epsN=0.01;
            let absX=Math.abs(normal.x), absY=Math.abs(normal.y), absZ=Math.abs(normal.z);
            if(absZ > 1-epsN) return {type:"📐 Горизонтальная уровня", desc:"∥ Π₁ (Z = const)", normal:normal};
            if(absY > 1-epsN) return {type:"📐 Фронтальная уровня", desc:"∥ Π₂ (Y = const)", normal:normal};
            if(absX > 1-epsN) return {type:"📐 Профильная уровня", desc:"∥ Π₃ (X = const)", normal:normal};
            if(Math.abs(nz)<epsN) return {type:"📌 Горизонтально-проецирующая", desc:"⊥ Π₁, след на H — прямая", normal:normal};
            if(Math.abs(ny)<epsN) return {type:"📌 Фронтально-проецирующая", desc:"⊥ Π₂, след на V — прямая", normal:normal};
            if(Math.abs(nx)<epsN) return {type:"📌 Профильно-проецирующая", desc:"⊥ Π₃, след на P — прямая", normal:normal};
            return {type:"🎲 Плоскость общего положения", desc:"Наклонена ко всем плоскостям", normal:normal};
        }
        function updateAllClassifications(){ 
            let lastLine=null;
            for(let i=spatialObjects.length-1;i>=0;i--) if(spatialObjects[i].primitive==='line' && isObjectComplete(spatialObjects[i])){lastLine=spatialObjects[i]; break;}
            let targetLine= (activeObject && activeObject.primitive==='line' && isObjectComplete(activeObject)) ? activeObject : lastLine;
            if(targetLine){
                let res=classifyLineSegment(targetLine.start, targetLine.end);
                document.getElementById('lineType').innerHTML=res.type;
                document.getElementById('lineDesc').innerHTML=res.desc;
                if(res.vec) document.getElementById('lineVector').innerHTML=`Направляющий вектор: (${res.vec.x.toFixed(1)}, ${res.vec.y.toFixed(1)}, ${res.vec.z.toFixed(1)})`;
                else document.getElementById('lineVector').innerHTML='';
            } else {
                document.getElementById('lineType').innerHTML='—';
                document.getElementById('lineDesc').innerHTML='Нарисуйте отрезок';
                document.getElementById('lineVector').innerHTML='';
            }
            let lastPlane=null;
            for(let i=spatialObjects.length-1;i>=0;i--) if(spatialObjects[i].primitive==='plane' && isObjectComplete(spatialObjects[i])){lastPlane=spatialObjects[i]; break;}
            let targetPlane= (activeObject && activeObject.primitive==='plane' && isObjectComplete(activeObject)) ? activeObject : lastPlane;
            if(targetPlane && targetPlane.points && targetPlane.points.length===3){
                let [p1,p2,p3]=targetPlane.points;
                let res=classifyPlane(p1,p2,p3);
                document.getElementById('planeType').innerHTML=res.type;
                document.getElementById('planeDesc').innerHTML=res.desc;
                if(res.normal) document.getElementById('planeNormal').innerHTML=`Нормаль: (${res.normal.x.toFixed(3)}, ${res.normal.y.toFixed(3)}, ${res.normal.z.toFixed(3)})`;
                else document.getElementById('planeNormal').innerHTML='';
            } else {
                document.getElementById('planeType').innerHTML='—';
                document.getElementById('planeDesc').innerHTML='Постройте треугольник';
                document.getElementById('planeNormal').innerHTML='';
            }
        }
        
        // ---------- ОБРАБОТЧИКИ (полностью скопированы из APLV2, без изменений) ----------
        function startDrawingGeneric(e, canvas, planeId) {
            if(currentPrimitive===PRIMITIVE_TYPES.PLANE) return;
            e.preventDefault();
            const pos=getPointerPos(canvas,e); const world=canvasToWorld(pos.x,pos.y,planeId);
            let {x,y}=snapWithConstraints(world.x,world.y,planeId);
            if(!activeObject||isNewObjectMode){ activeObject={id:Date.now()+'-'+Math.random(), start:{x:null,y:null,z:null}, end:{x:null,y:null,z:null}, color:currentColor, primitive:currentPrimitive}; isNewObjectMode=false; markConstraintsDirty(); }
            updateConstraints(); const degenerate=checkDegenerateProjection(planeId);
            if(degenerate.isDegenerate){ let px,py; if(degenerate.type==='vertical'){px=degenerate.value; py=y;} else if(degenerate.type==='horizontal'){px=x; py=degenerate.value;} else {px=degenerate.valueX; py=degenerate.valueY;}
                let pk='start'; if(activeObject.start.x!==null&&activeObject.start.y!==null&&activeObject.start.z!==null) pk='end';
                assignCoordinates(activeObject,planeId,px,py,pk); if(isObjectComplete(activeObject)){spatialObjects.push(activeObject); activeObject=null; markConstraintsDirty();} scheduleRedraw(); return; }
            const boundary=isOnBoundary(x,y,planeId); const hasConstraints=auxConstraints[planeId].minX!==null||auxConstraints[planeId].maxX!==null||auxConstraints[planeId].minY!==null||auxConstraints[planeId].maxY!==null;
            if(!boundary.onBoundary&&hasConstraints) return;
            let pointKey=null; if(boundary.onBoundary&&boundary.type) pointKey=findPointByCoordinate(planeId,boundary.type,boundary.value);
            drawing=true; startX=x; startY=y; currentCanvas=canvas; currentPlane=planeId; startConstraintType=boundary.type; startConstraintValue=boundary.value; currentPointKey=pointKey; previewLine=null; scheduleRedraw();
        }
        function moveGeneric(e){ if(!drawing||!currentCanvas||currentPrimitive===PRIMITIVE_TYPES.PLANE) return; e.preventDefault(); const pos=getPointerPos(currentCanvas,e); const world=canvasToWorld(pos.x,pos.y,currentPlane); const snapped=snapWithConstraints(world.x,world.y,currentPlane); previewLine={start:{x:startX,y:startY}, end:{x:snapped.x,y:snapped.y}}; scheduleRedraw(); }
        function endDrawingGeneric(e){ 
            if(!drawing||!currentCanvas||currentPrimitive===PRIMITIVE_TYPES.PLANE) return; 
            e.preventDefault(); 
            const pos=getPointerPos(currentCanvas,e); const world=canvasToWorld(pos.x,pos.y,currentPlane); 
            let {x,y}=snapWithConstraints(world.x,world.y,currentPlane); 
            updateConstraints(); 
            const hasConstraints=auxConstraints[currentPlane].minX!==null||auxConstraints[currentPlane].maxX!==null||auxConstraints[currentPlane].minY!==null||auxConstraints[currentPlane].maxY!==null;
            if(hasConstraints && startConstraintType){
                const cons=auxConstraints[currentPlane]; let endBoundary=null;
                if(startConstraintType==='vertical'){ if(cons.minX!==null&&Math.abs(x-cons.minX)<=TOLERANCE&&Math.abs(cons.minX-startConstraintValue)>TOLERANCE) endBoundary={onBoundary:true,type:'vertical',value:cons.minX}; else if(cons.maxX!==null&&Math.abs(x-cons.maxX)<=TOLERANCE&&Math.abs(cons.maxX-startConstraintValue)>TOLERANCE) endBoundary={onBoundary:true,type:'vertical',value:cons.maxX}; }
                else if(startConstraintType==='horizontal'){ if(cons.minY!==null&&Math.abs(y-cons.minY)<=TOLERANCE&&Math.abs(cons.minY-startConstraintValue)>TOLERANCE) endBoundary={onBoundary:true,type:'horizontal',value:cons.minY}; else if(cons.maxY!==null&&Math.abs(y-cons.maxY)<=TOLERANCE&&Math.abs(cons.maxY-startConstraintValue)>TOLERANCE) endBoundary={onBoundary:true,type:'horizontal',value:cons.maxY}; }
                if(endBoundary){
                    let endPointKey=findPointByCoordinate(currentPlane,endBoundary.type,endBoundary.value); 
                    if(!currentPointKey) currentPointKey='start'; 
                    if(!endPointKey) endPointKey=(currentPointKey==='start')?'end':'start'; 
                    let finalX=(endBoundary.type==='vertical')?endBoundary.value:x; 
                    let finalY=(endBoundary.type==='horizontal')?endBoundary.value:y;
                    assignCoordinates(activeObject,currentPlane,startX,startY,currentPointKey); 
                    assignCoordinates(activeObject,currentPlane,finalX,finalY,endPointKey);
                    if(isObjectComplete(activeObject)){spatialObjects.push(activeObject); activeObject=null; markConstraintsDirty();} 
                    drawing=false; previewLine=null; currentCanvas=null; currentPlane=null; startConstraintType=null; startConstraintValue=null; currentPointKey=null; scheduleRedraw();
                    return;
                }
            }
            assignCoordinates(activeObject,currentPlane,startX,startY,'start');
            assignCoordinates(activeObject,currentPlane,x,y,'end');
            drawing=false; previewLine=null; currentCanvas=null; currentPlane=null; startConstraintType=null; startConstraintValue=null; currentPointKey=null;
            if(isObjectComplete(activeObject)){spatialObjects.push(activeObject); activeObject=null; markConstraintsDirty();}
            scheduleRedraw();
        }
        
        function startPlaneVertex(planeId,sx,sy){ if(!activeObject) activeObject={id:Date.now()+'-plane', primitive:PRIMITIVE_TYPES.PLANE, points:[], color:currentColor}; planeTempVertex={x:null,y:null,z:null}; if(planeId==='H'){planeTempVertex.x=sx; planeTempVertex.y=sy;} else if(planeId==='V'){planeTempVertex.x=sx; planeTempVertex.z=sy;} else {planeTempVertex.y=sx; planeTempVertex.z=sy;} planeBuilding=true; planeStartPlane=planeId; planeStartCoords={x:sx,y:sy}; scheduleRedraw(); }
        function finishPlaneVertex(planeId,sx,sy){ if(!planeBuilding) return; if(planeId==='H'){ if(planeTempVertex.x!==null&&Math.abs(planeTempVertex.x-sx)>TOLERANCE) return; if(planeTempVertex.y!==null&&Math.abs(planeTempVertex.y-sy)>TOLERANCE) return; if(planeTempVertex.x===null) planeTempVertex.x=sx; if(planeTempVertex.y===null) planeTempVertex.y=sy; } else if(planeId==='V'){ if(planeTempVertex.x!==null&&Math.abs(planeTempVertex.x-sx)>TOLERANCE) return; if(planeTempVertex.z!==null&&Math.abs(planeTempVertex.z-sy)>TOLERANCE) return; if(planeTempVertex.x===null) planeTempVertex.x=sx; if(planeTempVertex.z===null) planeTempVertex.z=sy; } else { if(planeTempVertex.y!==null&&Math.abs(planeTempVertex.y-sx)>TOLERANCE) return; if(planeTempVertex.z!==null&&Math.abs(planeTempVertex.z-sy)>TOLERANCE) return; if(planeTempVertex.y===null) planeTempVertex.y=sx; if(planeTempVertex.z===null) planeTempVertex.z=sy; }
            if(planeTempVertex.x!==null&&planeTempVertex.y!==null&&planeTempVertex.z!==null){ let dup=false; for(let p of activeObject.points) if(Math.abs(p.x-planeTempVertex.x)<=TOLERANCE&&Math.abs(p.y-planeTempVertex.y)<=TOLERANCE&&Math.abs(p.z-planeTempVertex.z)<=TOLERANCE){dup=true; break;} if(!dup) activeObject.points.push({x:planeTempVertex.x,y:planeTempVertex.y,z:planeTempVertex.z}); planeBuilding=false; planeTempVertex={x:null,y:null,z:null}; if(activeObject.points.length===3){ spatialObjects.push(activeObject); activeObject=null; } scheduleRedraw(); } else scheduleRedraw(); }
        function onCanvasClick(e,canvas,planeId){ e.preventDefault(); const pos=getPointerPos(canvas,e); const world=canvasToWorld(pos.x,pos.y,planeId); const sx=snapToGrid(world.x), sy=snapToGrid(world.y); if(currentPrimitive===PRIMITIVE_TYPES.PLANE){ if(!activeObject||activeObject.points.length<3){ if(!planeBuilding) startPlaneVertex(planeId,sx,sy); else finishPlaneVertex(planeId,sx,sy); } return; } if(!drawing) startDrawingGeneric(e,canvas,planeId); else endDrawingGeneric(e); }
        function onMouseMove(e,canvas,planeId){ if(currentPrimitive===PRIMITIVE_TYPES.PLANE){ if(planeBuilding&&currentCanvas===canvas){ const pos=getPointerPos(canvas,e); const world=canvasToWorld(pos.x,pos.y,planeId); planeMousePos={x:snapToGrid(world.x),y:snapToGrid(world.y)}; scheduleRedraw(); } return; } moveGeneric(e); }
        function attachEvents(){ const handlers=[{canvas:canvasH,plane:'H'},{canvas:canvasV,plane:'V'},{canvas:canvasP,plane:'P'}]; handlers.forEach(({canvas,plane})=>{ canvas.addEventListener('mousedown',(e)=>onCanvasClick(e,canvas,plane)); canvas.addEventListener('mouseup',(e)=>{ if(drawing&&currentPrimitive!==PRIMITIVE_TYPES.PLANE) endDrawingGeneric(e); }); canvas.addEventListener('mousemove',(e)=>onMouseMove(e,canvas,plane)); canvas.addEventListener('mouseleave',()=>{ if(drawing&&currentPrimitive!==PRIMITIVE_TYPES.PLANE){ drawing=false; previewLine=null; currentCanvas=null; scheduleRedraw(); } }); canvas.addEventListener('touchstart',(e)=>{e.preventDefault(); onCanvasClick(e,canvas,plane);},{passive:false}); canvas.addEventListener('touchmove',(e)=>{e.preventDefault(); onMouseMove(e,canvas,plane);},{passive:false}); canvas.addEventListener('touchend',(e)=>{e.preventDefault(); if(drawing&&currentPrimitive!==PRIMITIVE_TYPES.PLANE) endDrawingGeneric(e);}); canvas.addEventListener('touchcancel',(e)=>{ if(drawing&&currentPrimitive!==PRIMITIVE_TYPES.PLANE){ drawing=false; previewLine=null; scheduleRedraw(); } }); }); document.addEventListener('mousemove',(e)=>{if(drawing&&currentCanvas&&currentPrimitive!==PRIMITIVE_TYPES.PLANE) moveGeneric(e);}); document.addEventListener('touchmove',(e)=>{if(drawing&&currentCanvas&&currentPrimitive!==PRIMITIVE_TYPES.PLANE) moveGeneric(e);},{passive:false}); }
        function getPointerPos(canvas, e) {
            const rect = canvas.getBoundingClientRect();
            let clientX, clientY;
            if (e.touches && e.touches.length) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
            else if (e.changedTouches && e.changedTouches.length) { clientX = e.changedTouches[0].clientX; clientY = e.changedTouches[0].clientY; }
            else { clientX = e.clientX; clientY = e.clientY; }
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
        }
        function clearAll(){ spatialObjects=[]; activeObject=null; drawing=false; previewLine=null; currentCanvas=null; planeBuilding=false; planeTempVertex={x:null,y:null,z:null}; planeMousePos=null; markConstraintsDirty(); scheduleRedraw(); }
        function setPrimitive(type,btnId){ currentPrimitive=type; ['lineBtn','rectBtn','ellipseBtn','planeBtn'].forEach(id=>document.getElementById(id).classList.remove('mode-active')); document.getElementById(btnId).classList.add('mode-active'); if(activeObject&&!isObjectComplete(activeObject)) activeObject=null; drawing=false; previewLine=null; currentCanvas=null; planeBuilding=false; planeTempVertex={x:null,y:null,z:null}; scheduleRedraw(); }
        function startNewObject(){ isNewObjectMode=true; colorIndex=(colorIndex+1)%colorPalette.length; currentColor=colorPalette[colorIndex]; document.getElementById('colorIndicator').style.backgroundColor=currentColor; document.getElementById('newObjectBtn').innerHTML=`+ Новый объект <div class="right-badge"><div id="colorIndicator" class="color-indicator" style="background-color: ${currentColor};"></div></div>`; if(activeObject&&!isObjectComplete(activeObject)) activeObject=null; planeBuilding=false; scheduleRedraw(); }
        function updateAxes(){ axesContainer.innerHTML=''; const containerRect=container.getBoundingClientRect(); const canvasRect=canvasV.getBoundingClientRect(); const offsetX=canvasRect.left-containerRect.left; const offsetY=canvasRect.top-containerRect.top; const centerAbsX=offsetX+CANVAS_SIZE; const centerAbsY=offsetY+CANVAS_SIZE; const axisLen=CANVAS_SIZE+12; const orangeColor='#ff5500'; const addAxis=(dir,label,len,startOff)=>{ const line=document.createElement('div'); line.className='axis-line'; line.style.backgroundColor=orangeColor; const labelSpan=document.createElement('div'); labelSpan.className='axis-label'; labelSpan.textContent=label; labelSpan.style.color=orangeColor; if(dir==='left'){ line.style.width=`${len}px`; line.style.height='1.5px'; line.style.left=`${centerAbsX-len+startOff}px`; line.style.top=`${centerAbsY-0.75}px`; labelSpan.style.left=`${centerAbsX-len-12}px`; labelSpan.style.top=`${centerAbsY-9}px`; const arrow=document.createElement('div'); arrow.style.cssText=`position:absolute; width:0; height:0; border-top:4px solid transparent; border-bottom:4px solid transparent; border-right:6px solid ${orangeColor}; left:${centerAbsX-len-4}px; top:${centerAbsY-4}px;`; axesContainer.appendChild(arrow); } else if(dir==='right'){ line.style.width=`${len}px`; line.style.height='1.5px'; line.style.left=`${centerAbsX+startOff}px`; line.style.top=`${centerAbsY-0.75}px`; labelSpan.style.left=`${centerAbsX+len-9}px`; labelSpan.style.top=`${centerAbsY-10}px`; const arrow=document.createElement('div'); arrow.style.cssText=`position:absolute; width:0; height:0; border-top:4px solid transparent; border-bottom:4px solid transparent; border-left:6px solid ${orangeColor}; left:${centerAbsX+len-2}px; top:${centerAbsY-4}px;`; axesContainer.appendChild(arrow); } else if(dir==='down'){ line.style.width='1.5px'; line.style.height=`${len}px`; line.style.left=`${centerAbsX-0.75}px`; line.style.top=`${centerAbsY+startOff}px`; labelSpan.style.left=`${centerAbsX+5}px`; labelSpan.style.top=`${centerAbsY+len-5}px`; const arrow=document.createElement('div'); arrow.style.cssText=`position:absolute; width:0; height:0; border-left:4px solid transparent; border-right:4px solid transparent; border-top:6px solid ${orangeColor}; left:${centerAbsX-4}px; top:${centerAbsY+len-3}px;`; axesContainer.appendChild(arrow); } else if(dir==='up'){ line.style.width='1.5px'; line.style.height=`${len}px`; line.style.left=`${centerAbsX-0.75}px`; line.style.top=`${centerAbsY-len+startOff}px`; labelSpan.style.left=`${centerAbsX+5}px`; labelSpan.style.top=`${centerAbsY-len-10}px`; const arrow=document.createElement('div'); arrow.style.cssText=`position:absolute; width:0; height:0; border-left:4px solid transparent; border-right:4px solid transparent; border-bottom:6px solid ${orangeColor}; left:${centerAbsX-4}px; top:${centerAbsY-len-3}px;`; axesContainer.appendChild(arrow); } axesContainer.appendChild(line); axesContainer.appendChild(labelSpan); }; addAxis('left','X',axisLen,0); addAxis('right','Y',axisLen,0); addAxis('down','Y',axisLen,0); addAxis('up','Z',axisLen,0); const origin=document.createElement('div'); origin.style.cssText=`position:absolute; width:4px; height:4px; background:${orangeColor}; border-radius:0px; left:${centerAbsX-2}px; top:${centerAbsY-2}px; box-shadow:0 0 0 2px #171a1f;`; axesContainer.appendChild(origin); }
        function resizeCanvas(){ 
            let targetSize; if(window.innerWidth<=768){ let base=Math.floor(Math.min(window.innerHeight*0.36,window.innerWidth*0.4)); targetSize=Math.max(180,base-40); GRID_STEP=20; targetSize=Math.floor(targetSize/GRID_STEP)*GRID_STEP; if(targetSize<140) targetSize=140; } else { targetSize=Math.floor(window.innerHeight*0.42); GRID_STEP=20; targetSize=Math.floor(targetSize/GRID_STEP)*GRID_STEP; targetSize=Math.min(680,Math.max(260,targetSize)); } if(targetSize===CANVAS_SIZE) return; CANVAS_SIZE=targetSize; canvasV.width=canvasH.width=canvasP.width=CANVAS_SIZE; canvasV.height=canvasH.height=canvasP.height=CANVAS_SIZE; 
            const threeDiv = document.getElementById('threeContainer'); if(threeDiv && renderer) { threeDiv.style.width = `${CANVAS_SIZE}px`; threeDiv.style.height = `${CANVAS_SIZE}px`; renderer.setSize(CANVAS_SIZE, CANVAS_SIZE); if(camera) { camera.aspect = 1; camera.updateProjectionMatrix(); } }
            updateProjections(); updateAxes(); updateAllClassifications(); refresh3D(); updateConnectionLines();
        }
        function init(){ resizeCanvas(); attachEvents(); document.getElementById('clearBtn').addEventListener('click',clearAll); document.getElementById('newObjectBtn').addEventListener('click',startNewObject); document.getElementById('lineBtn').addEventListener('click',()=>setPrimitive('line','lineBtn')); document.getElementById('rectBtn').addEventListener('click',()=>setPrimitive('rect','rectBtn')); document.getElementById('ellipseBtn').addEventListener('click',()=>setPrimitive('ellipse','ellipseBtn')); document.getElementById('planeBtn').addEventListener('click',()=>setPrimitive('plane','planeBtn')); document.getElementById('toggleLinesBtn').addEventListener('click',toggleLines); window.addEventListener('resize',()=>resizeCanvas()); updateProjections(); initThree(); startNewObject(); updateAllClassifications(); updateConnectionLines(); }
        init();
    })();
